# ~/.tmux.conf — rewritten clean (2026)

# --- General ------------------------------------------------------------
set -g default-shell /opt/homebrew/bin/fish
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc:sitm=\\E[3m"   # truecolor + italics
set -g mouse on
set -g base-index 1                                    # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on                             # keep window numbers gapless
setw -g automatic-rename off
set -s escape-time 10                                  # snappier ESC in nvim
set -g history-limit 50000
set -g status-position bottom
set -g focus-events on

# Claude Code / modern terminal passthrough
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# --- Prefix & reload ----------------------------------------------------
# (keeping default C-b prefix)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# --- Vim-aware pane navigation (no plugin needed) -----------------------
# C-h/j/k/l move between panes, but pass through to vim/nvim when focused.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# Resize with prefix + H/J/K/L
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Quick window switching
bind -n S-Left  previous-window
bind -n S-Right next-window
bind Tab switch-client -l

# --- Copy mode (vi) -----------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# --- Status line — "Embark" theme (truecolor) ---------------------------
set -g status-interval 5
set -g status-style "bg=#1e1c31,fg=#8a889d"          # space1 bar, astral0 muted text
set -g status-left-length 40
set -g status-right-length 80
# Session block: bright fg on the dark-purple Embark accent.
set -g status-left  "#[fg=#cbe3e7,bg=#7676ff,bold] #S #[default] "
# Clock: blue date, cyan time — Embark's signature secondary accents.
set -g status-right "#[fg=#78a8ff]%Y-%m-%d #[fg=#abf8f7]%H:%M "
# Current window: inky text on the lavender purple chip.
setw -g window-status-current-format "#[fg=#100e23,bg=#d4bfff] #I:#W#{?window_zoomed_flag, ,} #[default]"
# Inactive windows: readable muted astral0 (space4 was too dim to read).
setw -g window-status-format "#[fg=#8a889d] #I:#W "

# Pane borders + popups/messages, kept in the Embark palette.
set -g pane-border-style        "fg=#3e3859"
set -g pane-active-border-style "fg=#7676ff"
set -g message-style            "fg=#cbe3e7,bg=#7676ff"
set -g mode-style               "fg=#100e23,bg=#d4bfff"   # copy-mode selection
